<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>First Record Detector</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f5f5f5;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background-color: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            cursor: pointer;
            background-color: #f2f2f2;
        }
        th.sorted-asc::after {
            content: " ▲";
        }
        th.sorted-desc::after {
            content: " ▼";
        }
        .italic {
            font-style: italic;
        }
        #api-logs {
            max-height: 150px;
            overflow-y: auto;
            background: #f9f9f9;
            border: 1px solid #ddd;
            padding: 10px;
            margin-top: 20px;
        }
        #loading-status {
            color: red;
            font-weight: bold;
            display: none;
        }
        img {
            width: 50px;
            height: 50px;
        }
        
        /* Styles for taxon suggestions */
        #suggestions {
            margin-top: 10px;
            margin-bottom: 20px;
        }
        .suggestion {
            padding: 8px;
            border-bottom: 1px solid #ccc;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            cursor: pointer;
            background-color: white;
        }
        .suggestion:hover {
            background-color: #f5f5f5;
        }
        .info {
            display: flex;
            flex-direction: column;
        }
        .link {
            font-size: 18px;
            text-decoration: none;
            margin-left: 8px;
        }
        .link:hover {
            text-decoration: underline;
        }
        .symbols {
            display: flex;
            gap: 10px;
        }
        .chart-container {
            margin-top: 20px;
        }
        canvas {
            max-width: 100%;
            height: auto;
        }
        
        /* Layout */
        .container {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }
        .section {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .selected-taxon-info {
            background-color: #e8f4f8;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            border-left: 4px solid #4a90e2;
        }
        
        /* Neon Pink Title */
        .neon-pink-title {
            text-align: center;
            font-size: 2.5em;
            font-weight: bold;
            color: #ff14a1;
            text-shadow: 
                0 0 5px #ff14a1,
                0 0 10px #ff14a1;
            margin-bottom: 30px;
            padding: 10px;
            letter-spacing: 1px;
        }
        
        /* Form styles */
        .filter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .filter-group label {
            font-weight: bold;
            color: #333;
        }
        .filter-group select,
        .filter-group input {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }
        
        /* Button styles */
        .button-group {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }
        .button {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .button-primary {
            background-color: #4a90e2;
            color: white;
        }
        .button-primary:hover {
            background-color: #357ae8;
        }
        .button-secondary {
            background-color: #666;
            color: white;
        }
        .button-secondary:hover {
            background-color: #555;
        }
        .button-secondary:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        .button-clear {
            background-color: #ff6b6b;
            color: white;
            padding: 5px 10px;
            font-size: 14px;
            margin-top: 10px;
        }
        .button-clear:hover {
            background-color: #ff5252;
        }
    </style>
</head>
<body>
    <h1 class="neon-pink-title">First Record Detector</h1>
    
    <div class="container">
        <!-- Section 1: Select Taxon -->
        <div class="section">
            <h2>1. Select Taxon</h2>
            <input type="text" id="taxonInput" placeholder="Enter taxon name (minimum 3 characters)" 
                   style="width: 100%; padding: 10px; margin-bottom: 15px; font-size: 16px;" />
            <div id="suggestions"></div>
            <div id="selectedTaxonInfo" class="selected-taxon-info" style="display: none;">
                <h3>Selected Taxon: <span id="selectedTaxonName" style="color: #4a90e2;"></span></h3>
                <p><strong>Rank:</strong> <span id="selectedTaxonRank"></span></p>
                <p><strong>Taxon ID:</strong> <span id="selectedTaxonId"></span></p>
                <button id="clearSelection" class="button button-clear">Clear Selection</button>
            </div>
        </div>
        
        <!-- Section 2: Configure Analysis -->
        <div class="section">
            <h2>2. Configure Analysis</h2>
            <div class="filter-grid">
                <div class="filter-group">
                    <label for="quality-filter">Quality Filter:</label>
                    <select id="quality-filter">
                        <option value="verifiable=true">Verifiable</option>
                        <option value="quality_grade=research">Research Grade</option>
                    </select>
                </div>
                
                <div class="filter-group">
                    <label for="taxonomic-rank">Taxonomic Rank:</label>
                    <select id="taxonomic-rank">
                        <option value="genus">Genus</option>
                        <option value="species">Species</option>
                    </select>
                </div>
                
                <div class="filter-group">
                    <label for="start-date">Start Date:</label>
                    <input type="date" id="start-date">
                </div>
                
                <div class="filter-group">
                    <label for="end-date">End Date:</label>
                    <input type="date" id="end-date">
                </div>
                
                <div class="filter-group">
                    <label for="user-name">User Name (optional):</label>
                    <input type="text" id="user-name" placeholder="Enter user name">
                </div>
            </div>
            
            <div class="button-group">
                <button id="run-query" class="button button-primary">Run Analysis</button>
                <button id="view-histogram" class="button button-secondary" disabled>View Histogram</button>
            </div>
            
            <p id="loading-status">Loading data, please wait...</p>
            <p id="total-results" style="font-weight: bold; color: #4a90e2;"></p>
            
            <div id="chartArea" class="chart-container"></div>
            
            <table>
                <thead>
                    <tr>
                        <th class="sortable" data-column="0">Order</th>
                        <th class="sortable" data-column="1">Taxon Name</th>
                        <th class="sortable" data-column="2">Taxon ID</th>
                        <th class="sortable" data-column="3">Observation Count</th>
                        <th class="sortable" data-column="4">Total</th>
                        <th class="sortable sorted-desc" data-column="5">Ratio</th>
                        <th class="sortable" data-column="6">Photo</th>
                    </tr>
                </thead>
                <tbody id="data-table"></tbody>
            </table>
            
            <h3>API Calls</h3>
            <div id="api-logs"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        // Global variables
        const apiLogDiv = document.getElementById('api-logs');
        let currentSortColumn = 5; // Ratio column is index 5
        let sortAscending = false; // Start with descending order (highest ratio first)
        let selectedTaxonId = null;
        let selectedTaxonName = null;
        let chartInstance = null;
        let debounceTimeout;

        // DOM elements
        const taxonInput = document.getElementById('taxonInput');
        const suggestionsContainer = document.getElementById('suggestions');
        const selectedTaxonInfo = document.getElementById('selectedTaxonInfo');
        const selectedTaxonNameSpan = document.getElementById('selectedTaxonName');
        const selectedTaxonRankSpan = document.getElementById('selectedTaxonRank');
        const selectedTaxonIdSpan = document.getElementById('selectedTaxonId');
        const clearSelectionBtn = document.getElementById('clearSelection');
        const runQueryBtn = document.getElementById('run-query');
        const viewHistogramBtn = document.getElementById('view-histogram');
        const chartArea = document.getElementById('chartArea');

        // Event Listeners
        taxonInput.addEventListener('input', () => {
            clearTimeout(debounceTimeout);
            debounceTimeout = setTimeout(fetchSuggestions, 300);
        });

        clearSelectionBtn.addEventListener('click', () => {
            selectedTaxonId = null;
            selectedTaxonName = null;
            selectedTaxonInfo.style.display = 'none';
            taxonInput.value = '';
            suggestionsContainer.innerHTML = '';
            viewHistogramBtn.disabled = true;
        });

        viewHistogramBtn.addEventListener('click', () => {
            if (selectedTaxonId) {
                fetchAndRenderHistogram(selectedTaxonId);
            }
        });

        runQueryBtn.addEventListener('click', async () => {
            const qualityFilter = document.getElementById('quality-filter').value;
            const taxonomicRank = document.getElementById('taxonomic-rank').value;
            const startDate = document.getElementById('start-date').value;
            const endDate = document.getElementById('end-date').value;
            const userName = document.getElementById('user-name').value;

            let apiUrl = `https://api.inaturalist.org/v2/observations/species_counts?place_id=120582&fields=taxon.id,taxon.name,taxon.default_photo.square_url,count&${qualityFilter}&hrank=${taxonomicRank}`;
            
            // Add selected taxon filter if available
            if (selectedTaxonId) {
                apiUrl += `&taxon_id=${selectedTaxonId}`;
            }
            
            if (userName) apiUrl += `&user_login=${userName}`;
            if (startDate) apiUrl += `&d1=${startDate}`;
            if (endDate) apiUrl += `&d2=${endDate}`;

            document.getElementById('loading-status').style.display = 'block';
            document.getElementById('total-results').textContent = '';
            document.getElementById('data-table').innerHTML = '';
            apiLogDiv.innerHTML = '';
            chartArea.innerHTML = '';

            await fetchDataWithPagination(apiUrl, startDate, endDate, qualityFilter, userName);
        });

        // Functions for taxon suggestions
        async function fetchSuggestions() {
            const input = taxonInput.value.trim();
            if (input.length < 3) {
                suggestionsContainer.innerHTML = '';
                return;
            }

            const query = encodeURIComponent(input);

            try {
                const response = await fetch(`https://api.inaturalist.org/v1/taxa/autocomplete?q=${query}`);
                if (!response.ok) throw new Error('Failed to fetch suggestions');
                const data = await response.json();

                suggestionsContainer.innerHTML = '';

                data.results.forEach(async (result) => {
                    const suggestionElement = document.createElement('div');
                    suggestionElement.classList.add('suggestion');

                    const infoElement = document.createElement('div');
                    infoElement.classList.add('info');
                    infoElement.innerHTML = `
                        <span><strong>${result.name}</strong> (Rank: ${result.rank})</span>
                        <span>ID: ${result.id}</span>
                    `;

                    // Click to select taxon
                    suggestionElement.addEventListener('click', () => {
                        selectTaxon(result.id, result.name, result.rank);
                    });

                    suggestionElement.appendChild(infoElement);
                    suggestionsContainer.appendChild(suggestionElement);
                });
            } catch (error) {
                suggestionsContainer.innerHTML = '<div>Error loading suggestions.</div>';
            }
        }

        function selectTaxon(taxonId, taxonName, taxonRank) {
            selectedTaxonId = taxonId;
            selectedTaxonName = taxonName;
            
            selectedTaxonNameSpan.textContent = taxonName;
            selectedTaxonRankSpan.textContent = taxonRank;
            selectedTaxonIdSpan.textContent = taxonId;
            selectedTaxonInfo.style.display = 'block';
            
            suggestionsContainer.innerHTML = '';
            taxonInput.value = taxonName;
            viewHistogramBtn.disabled = false;
        }

        // Functions for data table and analysis
        function logApiCall(url) {
            const logEntry = document.createElement('div');
            logEntry.textContent = url;
            apiLogDiv.appendChild(logEntry);
        }

        function delay(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        function sortTable(columnIndex) {
            const rows = Array.from(document.getElementById('data-table').rows);
            
            // Update order numbers before sorting
            updateOrderNumbers();

            rows.sort((a, b) => {
                const cellA = a.cells[columnIndex].textContent;
                const cellB = b.cells[columnIndex].textContent;

                const valueA = isNaN(cellA) ? cellA : parseFloat(cellA);
                const valueB = isNaN(cellB) ? cellB : parseFloat(cellB);

                if (valueA < valueB) return sortAscending ? -1 : 1;
                if (valueA > valueB) return sortAscending ? 1 : -1;
                return 0;
            });

            // Append sorted rows and update order numbers
            rows.forEach(row => document.getElementById('data-table').appendChild(row));
            updateOrderNumbers();
            
            // Update table header classes
            document.querySelectorAll('th').forEach(th => th.classList.remove('sorted-asc', 'sorted-desc'));
            const header = document.querySelector(`th[data-column="${columnIndex}"]`);
            header.classList.add(sortAscending ? 'sorted-asc' : 'sorted-desc');
        }

        function updateOrderNumbers() {
            const rows = document.querySelectorAll('#data-table tr');
            rows.forEach((row, index) => {
                row.cells[0].textContent = index + 1;
            });
        }

        // Add sorting event listeners to table headers
        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('.sortable').forEach(header => {
                header.addEventListener('click', () => {
                    const columnIndex = parseInt(header.dataset.column, 10);

                    if (currentSortColumn === columnIndex) {
                        sortAscending = !sortAscending;
                    } else {
                        currentSortColumn = columnIndex;
                        sortAscending = true;
                    }

                    document.querySelectorAll('th').forEach(th => th.classList.remove('sorted-asc', 'sorted-desc'));
                    header.classList.add(sortAscending ? 'sorted-asc' : 'sorted-desc');

                    sortTable(columnIndex);
                });
            });
        });

        async function fetchDataWithPagination(apiUrl, startDate, endDate, qualityFilter, userName) {
            let allResults = [];
            let currentPage = 1;

            while (true) {
                const paginatedUrl = `${apiUrl}&page=${currentPage}`;
                logApiCall(paginatedUrl);

                try {
                    const response = await fetch(paginatedUrl);
                    if (!response.ok) throw new Error(`HTTP error ${response.status}`);
                    const data = await response.json();

                    allResults = allResults.concat(data.results);
                    if (data.results.length === 0 || allResults.length >= data.total_results) break;

                    currentPage++;
                    await delay(1000);
                } catch (error) {
                    console.error('Error during pagination:', error);
                    break;
                }
            }

            if (allResults.length > 0) {
                document.getElementById('total-results').textContent = `Total Results: ${allResults.length}`;
                populateTable(allResults, startDate, endDate, qualityFilter, userName);
            }
            document.getElementById('loading-status').style.display = 'none';

            await fetchTotalObservationCounts(allResults, startDate, endDate, qualityFilter, userName);
        }

        async function fetchTotalObservationCounts(data, startDate, endDate, qualityFilter, userName) {
            const taxonIds = data.map(item => item.taxon.id);
            let allResults = [];
            const batchSize = 50;

            for (let i = 0; i < taxonIds.length; i += batchSize) {
                const batch = taxonIds.slice(i, i + batchSize);
                let apiUrl = `https://api.inaturalist.org/v2/observations/species_counts?taxon_id=${batch.join(',')}&place_id=120582&fields=taxon.id,taxon.name,count`;
                logApiCall(apiUrl);

                try {
                    const response = await fetch(apiUrl);
                    const data = await response.json();
                    allResults = allResults.concat(data.results);
                    await delay(1000);
                } catch (error) {
                    console.error('Error fetching total counts:', error);
                    break;
                }
            }

            const rows = document.querySelectorAll('#data-table tr');
            rows.forEach(row => {
                const taxonId = row.cells[2].textContent.trim();
                const countCell = row.cells[3];
                const totalCell = row.cells[4];
                const ratioCell = row.cells[5];
                const total = allResults.find(item => item.taxon.id === parseInt(taxonId));

                if (total) {
                    totalCell.textContent = total.count;
                    countCell.textContent = countCell.textContent.trim();
                    const filteredCount = parseInt(countCell.textContent);
                    const totalCount = parseInt(total.count);
                    
                    // Calculate ratio as a number between 0 and 1
                    const ratio = totalCount > 0 ? (filteredCount / totalCount) : 0;
                    ratioCell.textContent = ratio.toFixed(4); // Show 4 decimal places

                    // Update the observation count URL with filters
                    const observationUrl = `https://inaturalist.lu/observations?taxon_id=${taxonId}&${qualityFilter}&d1=${startDate}&d2=${endDate}&user_login=${userName}`;
                    countCell.innerHTML = `<a href="${observationUrl}" target="_blank">${filteredCount}</a>`;
                }
            });
            
            // Sort by Ratio column in descending order after all data is loaded
            sortTable(5);
        }

        function populateTable(data, startDate, endDate, qualityFilter, userName) {
            const tableBody = document.getElementById('data-table');
            tableBody.innerHTML = '';

            data.forEach((item, index) => {
                const row = document.createElement('tr');
                const taxonName = item.taxon.name;
                const taxonId = item.taxon.id;
                const count = item.count;
                const photoUrl = item.taxon.default_photo ? item.taxon.default_photo.square_url : '';

                row.innerHTML = `
                    <td>${index + 1}</td>
                    <td class="italic">${taxonName}</td>
                    <td><a href="https://www.inaturalist.org/taxa/${taxonId}" target="_blank">${taxonId}</a></td>
                    <td><a href="https://inaturalist.lu/observations?taxon_id=${taxonId}&${qualityFilter}&d1=${startDate}&d2=${endDate}&user_login=${userName}" target="_blank">${count}</a></td>
                    <td class="total"></td>
                    <td class="ratio"></td>
                    <td><img src="${photoUrl}" alt="${taxonName}" onerror="this.style.display='none'"></td>
                `;
                tableBody.appendChild(row);
            });
            
            // Set Ratio header to show descending sort initially
            document.querySelectorAll('th').forEach(th => th.classList.remove('sorted-asc', 'sorted-desc'));
            document.querySelector(`th[data-column="5"]`).classList.add('sorted-desc');
        }

        // Histogram functions
        async function fetchAndRenderHistogram(taxonId) {
            try {
                const url = `https://api.inaturalist.org/v2/observations/histogram?d1=2018-01-01&d2=2025-12-31&order=desc&order_by=created_at&fields=species_guess%2Cobserved_on&date_field=observed&interval=week&place_id=120582&taxon_id=${taxonId}`;
                const response = await fetch(url);
                const data = await response.json();

                const weekData = data.results.week;
                const years = {};
                for (const [dateStr, count] of Object.entries(weekData)) {
                    const date = new Date(dateStr);
                    const year = date.getFullYear();
                    const week = getWeekNumber(date);
                    if (!years[year]) years[year] = {};
                    years[year][week] = (years[year][week] || 0) + count;
                }

                const allWeeks = Array.from({ length: 53 }, (_, i) => i + 1);
                const datasets = Object.keys(years).sort((a, b) => b - a).map((year, index) => ({
                    label: year,
                    data: allWeeks.map(w => years[year][w] || 0),
                    borderColor: `hsl(${(index * 60) % 360}, 70%, 50%)`,
                    fill: false,
                }));

                const ctxId = 'histogramChart';
                chartArea.innerHTML = `<canvas id="${ctxId}"></canvas>`;
                const ctx = document.getElementById(ctxId).getContext('2d');

                if (chartInstance) {
                    chartInstance.destroy();
                }

                chartInstance = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: allWeeks.map(w => `W${w}`),
                        datasets: datasets,
                    },
                    options: {
                        responsive: true,
                        plugins: {
                            title: {
                                display: true,
                                text: `Weekly Observations for ${selectedTaxonName}`
                            },
                            tooltip: {
                                mode: 'index',
                                intersect: false
                            }
                        },
                        interaction: {
                            mode: 'nearest',
                            axis: 'x',
                            intersect: false
                        },
                        scales: {
                            x: {
                                title: { display: true, text: 'Week of Year' }
                            },
                            y: {
                                title: { display: true, text: 'Observation Count' },
                                beginAtZero: true
                            }
                        }
                    }
                });
            } catch (error) {
                chartArea.innerHTML = '<div>Error loading chart data.</div>';
                console.error('Chart error:', error);
            }
        }

        function getWeekNumber(date) {
            const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
            const dayNum = d.getUTCDay() || 7;
            d.setUTCDate(d.getUTCDate() + 4 - dayNum);
            const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
            return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
        }
    </script>
</body>
</html>
